name: Coin-Scout

on:
  schedule:
    - cron: "*/5 * * * *"   # 5分おきに自動実行（GitHubの都合で多少前後します）
  workflow_dispatch:          # 手動実行ボタンも有効にする

permissions:
  contents: write             # 通知済み記録(seen.json)を保存するために必要

concurrency:
  group: coin-scout
  cancel-in-progress: false   # 実行が重ならないよう順番待ちさせる

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Pythonを準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Coin-Scoutを実行
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python coin_scout.py

      - name: 通知済み記録を保存
        run: |
          if [[ -z "$(git status --porcelain seen.json)" ]]; then
            echo "記録に変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git commit -m "Update seen items [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "保存しました"
              exit 0
            fi
            echo "保存に失敗。${i}回目のやり直し..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "やり直しても保存できませんでした"
          exit 1
