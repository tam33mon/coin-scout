name: Coin-Scout

on:
  schedule:
    - cron: "*/5 * * * *"   # 5分おきに自動実行（GitHubの都合で多少前後します）
  workflow_dispatch:          # 手動実行ボタンも有効にする

permissions:
  contents: write             # 通知済み記録(seen.json)を保存するために必要

concurrency:
  group: coin-scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Pythonを準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: Coin-Scoutを実行
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python coin_scout.py

      - name: 通知済み記録を保存
        run: |
          if [[ -n "$(git status --porcelain seen.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "Update seen items [skip ci]"
            git pull --rebase --autostash
            git push
          fi
